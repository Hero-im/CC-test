<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>자막 추출 & AI 교정기</title>
    <style>
        /* 기본 배경 및 폰트 설정 */
        body {
            font-family: 'Pretendard', 'Malgun Gothic', sans-serif;
            background-color: #f4f7f6; /* 눈이 편안한 밝은 회색 배경 */
            color: #333;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        /* 메인 컨텐츠를 담는 하얀색 카드 영역 */
        .container {
            background-color: #ffffff;
            width: 100%;
            max-width: 800px;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05); /* 부드러운 그림자 */
        }

        /* 제목 스타일 */
        h2 {
            margin-top: 0;
            color: #2c3e50;
            font-size: 24px;
            border-bottom: 2px solid #edf2f7;
            padding-bottom: 15px;
            margin-bottom: 25px;
        }
        
        h3 {
            font-size: 18px;
            color: #4a5568;
            margin-top: 35px;
            margin-bottom: 15px;
        }

        /* 입력창 라벨 및 텍스트박스 스타일 */
        label {
            display: block;
            font-size: 14px;
            font-weight: bold;
            color: #4a5568;
            margin-bottom: 8px;
        }

        textarea {
            width: 100%;
            height: 220px; /* 입력창 높이를 시원하게 키움 */
            padding: 15px;
            box-sizing: border-box;
            border: 1px solid #cbd5e0;
            border-radius: 8px;
            font-family: inherit;
            font-size: 15px;
            line-height: 1.6;
            resize: vertical; /* 세로로만 크기 조절 가능하게 설정 */
            background-color: #f8fafc;
            transition: border-color 0.3s ease, background-color 0.3s ease;
        }

        /* 텍스트박스 클릭 시 효과 */
        textarea:focus {
            outline: none;
            border-color: #3182ce; /* 파란색 테두리 */
            background-color: #ffffff;
        }

        /* 버튼 디자인 */
        button {
            width: 100%;
            padding: 16px;
            background-color: #3182ce;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: background-color 0.2s ease, transform 0.1s ease;
        }

        /* 버튼 마우스 호버/클릭 액션 */
        button:hover {
            background-color: #2b6cb0;
        }
        button:active {
            transform: scale(0.98); /* 클릭 시 살짝 눌리는 효과 */
        }

        /* 상태 메시지 글씨 */
        #statusMsg {
            margin-top: 15px;
            font-size: 14px;
            color: #718096;
            text-align: center;
            min-height: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>✨ 온라인 강의 자막 추출 & AI 교정기</h2>
        
        <label for="jsonInput">1. Network 탭에서 복사한 JSON 데이터를 붙여넣으세요</label>
        <textarea id="jsonInput" placeholder='[ { "Caption": "자막 내용..." }, ... ] 형식의 데이터를 넣어주세요.'></textarea>
        
        <button onclick="processSubtitles()">자막 추출 및 교정하기</button>
        <p id="statusMsg"></p>
        
        <h3>2. 최종 결과 (추출 + AI 교정)</h3>
        <textarea id="textOutput" placeholder="AI가 문맥을 파악하여 띄어쓰기와 오탈자를 교정한 자막이 여기에 표시됩니다." readonly></textarea>
    </div>

    <script>
        async function processSubtitles() {
            const inputData = document.getElementById('jsonInput').value;
            const outputArea = document.getElementById('textOutput');
            const statusMsg = document.getElementById('statusMsg');

            if (!inputData.trim()) {
                statusMsg.innerText = "데이터를 먼저 입력해 주세요!";
                return;
            }

            try {
                // 1. JSON에서 텍스트만 추출
                statusMsg.innerText = "⏳ 1단계: 자막 텍스트를 추출하는 중...";
                const parsedData = JSON.parse(inputData);
                const extractedText = parsedData.map(item => item.Caption).join(' ');

                // 2. Vercel 백엔드 서버로 AI 교정 요청 (현재는 뼈대 상태)
                statusMsg.innerText = "🚀 2단계: AI가 문맥을 분석하여 오탈자를 교정하는 중... (수 초 정도 소요됩니다)";
                
                // 실제 서버가 구축되기 전까지 테스트할 수 있도록, 
                // 아래 fetch 통신 부분은 주석 처리하고 임시로 원본 추출 텍스트만 띄우겠습니다.
                
                /* // ---- 백엔드 완성 후 이 주석을 푸세요 ----
                const response = await fetch('/api/correct', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: extractedText })
                });

                const resultData = await response.json();

                if (response.ok) {
                    outputArea.value = resultData.result;
                    statusMsg.innerText = "✅ 교정이 완료되었습니다!";
                } else {
                    statusMsg.innerText = "❌ 오류 발생: " + resultData.error;
                }
                */

                // 임시 출력 코드 (서버 붙이기 전 테스트용)
                setTimeout(() => {
                    outputArea.value = extractedText;
                    statusMsg.innerText = "✅ 텍스트 추출 완료! (AI 서버 연동 대기 중)";
                }, 1000);

            } catch (error) {
                statusMsg.innerText = "❌ 오류: JSON 형식이 잘못되었거나 복사 과정에서 문제가 발생했습니다.";
            }
        }
    </script>

</body>
</html>
